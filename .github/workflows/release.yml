name: Release Obsidian Plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update plugin version from tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          node -e '
            const fs = require("fs");
            const version = process.argv[1];

            const manifestPath = "manifest.json";
            const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
            manifest.version = version;
            fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);

            const versionsPath = "versions.json";
            const versions = JSON.parse(fs.readFileSync(versionsPath, "utf8"));
            const minAppVersion = manifest.minAppVersion;
            versions[version] = minAppVersion;
            fs.writeFileSync(versionsPath, `${JSON.stringify(versions, null, 2)}\n`);
          ' "$VERSION"

      - name: Build plugin
        run: npm run build

      - name: Package release assets
        id: package
        shell: bash
        run: |
          set -euo pipefail

          PLUGIN_ID="$(node -p "require('./manifest.json').id")"
          PLUGIN_VERSION="$(node -p "require('./manifest.json').version")"
          ZIP_NAME="${PLUGIN_ID}-${PLUGIN_VERSION}.zip"

          STYLE_FILE=""
          if [ -f "styles.css" ]; then
            STYLE_FILE="styles.css"
          elif [ -f "style.css" ]; then
            STYLE_FILE="style.css"
          fi

          FILES=(manifest.json main.js versions.json)
          if [ -n "$STYLE_FILE" ]; then
            FILES+=("$STYLE_FILE")
          fi

          mkdir -p dist
          cp "${FILES[@]}" dist/

          (
            cd dist
            zip -r "../$ZIP_NAME" .
          )

          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "style_file=$STYLE_FILE" >> "$GITHUB_OUTPUT"

      - name: Ensure release exists for tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release for $TAG already exists"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Release $TAG"
          fi

      - name: Upload assets to tag release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          ZIP_NAME="${{ steps.package.outputs.zip_name }}"
          STYLE_FILE="${{ steps.package.outputs.style_file }}"

          ASSETS=(manifest.json main.js versions.json "$ZIP_NAME")
          if [ -n "$STYLE_FILE" ]; then
            ASSETS+=("$STYLE_FILE")
          fi

          gh release upload "$TAG" "${ASSETS[@]}" --clobber
